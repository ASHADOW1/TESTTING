<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disaster Response Dashboard</title>

<!-- Link your external CSS -->
<link rel="stylesheet" href="styles.css">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

</head>
<body>
<div class="container">
  <header class="header">
    <h1 id="titlesize">Disaster Response Dashboard</h1>
    <p id="description">
      <strong>Disaster Relay</strong> is a live public dashboard showing current situations across communities. 
      Communities are grouped by <b>priority level</b> so viewers can quickly see urgent needs. Click on a community to view needs such as <b>food, water, or shelter</b> and injury status.
    </p>
  </header>

  <div class="update" id="updateTime"></div>

  <!-- Dashboard content goes here -->
  <div id="dashboard"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/13WUAN1zNK3fH_wX32QLb44EnQNiA5Z0_jwTtYA_2XHA/export?format=csv&gid=0";
const priorityRank = { high:3, medium:2, low:1 };

// Fetch CSV
async function fetchCSV(){
  const res = await fetch(CSV_URL + "&t=" + Date.now());
  return await res.text();
}

// Parse CSV to JSON
function csvToJSON(csv){
  const rows = csv.split("\n").slice(1);
  return rows.map(r=>{
    const c = r.split(",");
    return {
      parish: (c[1]||"").trim(),
      community: (c[2]||"").trim(),
      needs: (c[3]||"").toLowerCase(),
      severity: (c[5]||"").toLowerCase()
    };
  }).filter(x=>x.parish && x.community);
}

// Keep highest priority per community
function resolveHighestPriority(data){
  const map = {};
  data.forEach(r=>{
    const key = r.parish + "-" + r.community;
    if(!map[key] || priorityRank[r.severity] > priorityRank[map[key].severity]){
      map[key] = r;
    }
  });
  return Object.values(map);
}

// Group by priority -> parish -> community
function groupData(data){
  const grouped = { high:{}, medium:{}, low:{} };
  data.forEach(r=>{
    if(!grouped[r.severity]) return;
    if(!grouped[r.severity][r.parish]) grouped[r.severity][r.parish]={};
    if(!grouped[r.severity][r.parish][r.community]) grouped[r.severity][r.parish][r.community]={count:0,needs:r.needs};
    grouped[r.severity][r.parish][r.community].count++;
  });
  return grouped;
}

// Map needs to icons
function needIcons(needs){
  let icons = "";
  if(needs.includes("food")) icons += "🍞 ";
  if(needs.includes("water")) icons += "💧 ";
  if(needs.includes("shelter")) icons += "🏠 ";
  return icons || "—";
}

// Render dashboard
function render(grouped){
  const dashboard = document.getElementById("dashboard");
  dashboard.innerHTML = "";

  ["high","medium","low"].forEach(priority=>{
    const section = document.createElement("section");
    section.className = `priority ${priority}`;
    section.innerHTML = `<h2>${priority.toUpperCase()} Priority</h2>`;

    const grid = document.createElement("div");
    grid.className = "parish-grid";

    Object.entries(grouped[priority]).forEach(([parish, communities])=>{
      const card = document.createElement("div");
      card.className = "parish-card";

      let communityHTML = "";
      Object.entries(communities).forEach(([community, data])=>{
        const name = data.count>1 ? `${community} x${data.count}` : community;
        const injuryClass = data.needs.includes("medical") ? "injured" : "none";
        const injuryText = data.needs.includes("medical") ? "⚠ Injuries Reported" : "✔ No Injuries";
        
        communityHTML += `
          <details class="community">
            <summary>${name}</summary>
            <div class="community-info">
              <p class="needs">${needIcons(data.needs)}</p>
              <p class="${injuryClass}">${injuryText}</p>
            </div>
          </details>
        `;
      });

      card.innerHTML = `<h3>${parish}</h3>${communityHTML}`;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    dashboard.appendChild(section);
  });
}

// Update dashboard every 30s
async function updateDashboard(){
  try{
    const csv = await fetchCSV();
    const json = csvToJSON(csv);
    const resolved = resolveHighestPriority(json);
    const grouped = groupData(resolved);
    render(grouped);
    document.getElementById("updateTime").innerText = "Last Updated: " + new Date().toLocaleTimeString();
  } catch(err){
    console.error("Error fetching or parsing CSV:", err);
    document.getElementById("updateTime").innerText = "Failed to update data";
  }
}

// Initial load
updateDashboard();
setInterval(updateDashboard, 30000);
</script>
</body>
</html>
